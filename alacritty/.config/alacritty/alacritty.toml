
[env]
TERM = "xterm-256color"

[window]
padding = { x = 15, y = 10 }
dynamic_padding = false

[font]
size = 18.0

[font.bold]
# family = "MesloLGS Nerd Font Mono"
family = "CaskaydiaCove Nerd Font"
style = "Bold"

[font.bold_italic]
family = "CaskaydiaCove Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "CaskaydiaCove Nerd Font"
# family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.normal]
# family = "MesloLGS Nerd Font Mono"
family = "CaskaydiaCove Nerd Font"
style = "Regular"

[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

# No Alacritty (exemplo em TOML)
[[keyboard.bindings]]
chars = "\u0003"
key = "C"
mods = "Super"

[[keyboard.bindings]]
chars = "\u0016"
key = "V"
mods = "Super"
