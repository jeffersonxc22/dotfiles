general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(3daee9ff)
    col.inactive_border = rgba(31363baa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(0a0a0acc)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        vibrancy = 0.15
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1

    animation = windows,      1, 4,   easeOutQuint
    animation = windowsIn,    1, 4,   easeOutQuint, popin 87%
    animation = windowsOut,   1, 2,   quick,        popin 87%
    animation = border,       1, 5,   easeOutQuint
    animation = fade,         1, 3,   quick
    animation = workspaces,   1, 2,   almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
