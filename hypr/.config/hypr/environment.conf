# --- Variáveis de Ambiente (Catppuccin Mocha Sapphire Edition) ---

# 1. Cursor - Capitaine Sapphire (ou sua preferência Sapphire)
env = XCURSOR_THEME,capitaine-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,capitaine-cursors
env = HYPRCURSOR_SIZE,24
env = GTK_IM_MODULE,cedilla
env = QT_IM_MODULE,cedilla
# 2. Qt - Removendo rastros do KDE e usando qt6ct/qt5ct
# Isso permite que você aplique o tema Sapphire via interface do qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# 3. GTK - Substituindo Breeze pelo Catppuccin oficial
# O nome do tema deve ser o mesmo que você instalou (ex: via AUR)
env = GTK_THEME,catppuccin-mocha-sapphire-standard+default
env = GDK_BACKEND,wayland,x11

# 4. Forçar Dark Mode (Essencial para GTK4 e Libadwaita)
# Isso garante que apps modernos não tentem abrir em modo claro 
env = ADW_DISABLE_PORTAL,1

# 5. NVIDIA - Configurações para o seu Alienware [cite: 2, 48]
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm

# 6. Wayland & Desktop Integration
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = TERMINAL,alacritty
