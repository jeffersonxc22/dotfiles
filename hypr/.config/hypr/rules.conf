windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Apps KDE flutuantes
windowrule {
    name = kde-float
    match:class = ^(org.kde.polkit-kde-authentication-agent-1|org.kde.krunner)$
    float = true
    center = true
}

# Dolphin
windowrule {
    name = dolphin-size
    match:class = ^org.kde.dolphin$
    size = 1200 800
    center = true
}
