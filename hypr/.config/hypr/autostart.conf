# --- Autostart Refatorado (Pure Hyprland) ---

# 1. Portais e D-Bus (Obrigatório para NVIDIA e Apps demorarem menos a abrir)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME QT_STYLE_OVERRIDE GTK_THEME
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME QT_STYLE_OVERRIDE GTK_THEME

# 2. Polkit (Autenticação sudo em interface)
# exec-once = systemctl --user start hyprpolkitagent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Gerenciador de senhas do GNOME (essencial para o Nautilus)
exec-once = gnome-keyring-daemon --start --components=secrets# 3. Mouse e Temas (Garante que o XWayland/Steam vejam o cursor)


exec-once = hyprctl setcursor capitaine-cursors 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'capitaine-cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "catppuccin-mocha-sapphire-standard+default"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

# 4. Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# 5. Apps de Sistema
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = blueman-applet

# 6. Papel de Parede
exec-once = awww-daemon
exec-once = awww img /home/jefferson/.config/backgrounds/hyprgirl.png


# 7. Sync Pastas In Drive
exec-once = rclone mount gdrive:Kode-D-Obsidian/ ~/Documents/Kode-D-Obsidian/
